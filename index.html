<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Painel - Gestão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <section id="tela-login">
        <div class="login-box">
            <div class="logo-container-css login-center">
                <div class="logo-bars-css">
                    <div class="bar-css"></div>
                    <div class="bar-css"></div>
                </div>
                <div class="logo-text-css">
                    <span class="atlas-text">ATLAS</span>
                    <span class="painel-text">P A I N E L</span>
                </div>
            </div>

            <h1>Sistema de Gestão</h1>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="login-email" placeholder="ID do Usuário">
            </div>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-senha" placeholder="Senha">
            </div>
            <button onclick="fazerLogin()" class="btn-primary">ENTRAR</button>
        </div>
    </section>

    <div id="app-principal" style="display:none;">
        <header>
            <div class="logo-container-css header-logo-scale">
                <div class="logo-bars-css">
                    <div class="bar-css"></div>
                    <div class="bar-css"></div>
                </div>
                <div class="logo-text-css">
                    <span class="atlas-text">ATLAS</span>
                    <span class="painel-text">P A I N E L</span>
                </div>
            </div>

            <div class="user-info">
                <span id="user-display">OPERADOR</span>
                <button onclick="location.reload()" class="btn-logout">Sair</button>
            </div>
        </header>

        <main>
            <section id="grid-home" class="grid-container">
    <div class="card" onclick="abrirModulo('injecao')"><i class="fas fa-microchip"></i><span>Injeção</span></div>
    <div class="card" onclick="abrirModulo('bobines')"><i class="fas fa-compact-disc"></i><span>Bobines</span></div>
    <div class="card" onclick="abrirModulo('serra')"><i class="fas fa-layer-group"></i><span>Serra</span></div>
    <div class="card" onclick="abrirModulo('embalagem')"><i class="fas fa-boxes-packing"></i><span>Embalagem</span></div>
    <div id="card-gestao" class="card" onclick="abrirModulo('gestao')"><i class="fas fa-chart-line"></i><span>Gestão</span></div>
    <div class="card" onclick="abrirModulo('config')"><i class="fas fa-gears"></i><span>Ajustes</span></div>
    <div class="card" onclick="abrirModulo('plano')"><i class="fas fa-clipboard-list"></i><span>Plano</span></div>
    <div id="card-conferencia" class="card" onclick="abrirModulo('conferencia')">
    <i class="fas fa-clipboard-check"></i>
    <span>Conferência</span>
</div>

</section>
          <section id="conteudo-modulo" style="display:none;">
                <div class="modulo-header">
                    <button onclick="voltarHome()" class="btn-voltar-clean">
                        <i class="fas fa-arrow-left"></i> VOLTAR
                    </button>
                    <h2 id="titulo-modulo" style="font-size:16px;">MÓDULO</h2>
                </div>
                <div id="render-modulo" class="modulo-body"></div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Atlas PWA: Ativo!'))
                    .catch(err => console.log('Erro PWA:', err));
            });
        }
    </script>

    <div id="modal-edicao" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; padding:20px;">
        <div style="background:#1e293b; width:100%; max-width:500px; padding:20px; border-radius:15px; border:1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <h3 style="color:white; margin-top:0; border-bottom:1px solid #334155; padding-bottom:10px;">Editar Registro</h3>
            <div id="conteudo-modal" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;"></div>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="fecharModal()" style="flex:1; background:#475569; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">CANCELAR</button>
                <button onclick="salvarEdicaoModal()" style="flex:1; background:#10b981; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR</button>
            </div>
        </div>
    </div>
</body>
</html>
