<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas Painel - Gestão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="tela-login">
        <div class="login-box">
            <img src="logo.png" alt="Atlas Logo" class="logo-login">
            <h1>Sistema de Gestão</h1>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="login-email" placeholder="ID do Usuário">
            </div>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-senha" placeholder="Senha">
            </div>
            <button onclick="fazerLogin()" class="btn-primary">ENTRAR</button>
        </div>
    </section>

    <div id="app-principal" style="display:none;">
        <header>
            <img src="logo.png" alt="Atlas" class="logo-header">
            <div class="user-info">
                <span id="user-display">OPERADOR</span>
                <button onclick="location.reload()" class="btn-logout">Sair</button>
            </div>
        </header>

        <main>
            <section id="grid-home" class="grid-container">
                <div class="card" onclick="abrirModulo('injecao')"><i class="fas fa-microchip"></i><span>Injeção</span></div>
                <div class="card" onclick="abrirModulo('bobines')"><i class="fas fa-compact-disc"></i><span>Bobines</span></div>
                <div class="card" onclick="abrirModulo('serra')"><i class="fas fa-layer-group"></i><span>Serra</span></div>
                <div class="card" onclick="abrirModulo('embalagem')"><i class="fas fa-boxes-packing"></i><span>Embalagem</span></div>
                <div class="card" onclick="abrirModulo('gestao')"><i class="fas fa-chart-line"></i><span>Gestão</span></div>
                <div class="card" onclick="abrirModulo('config')"><i class="fas fa-gears"></i><span>Ajustes</span></div>
            </section>

            <section id="conteudo-modulo" style="display:none;">
                <div class="modulo-header">
                    <button onclick="voltarHome()" class="btn-voltar-clean">
                        <i class="fas fa-arrow-left"></i> VOLTAR
                    </button>
                    <h2 id="titulo-modulo" style="font-size:16px;">MÓDULO</h2>
                </div>
                <div id="render-modulo" class="modulo-body"></div>
            </section>
        </main>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
